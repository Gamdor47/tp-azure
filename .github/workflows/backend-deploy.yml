name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Installer les dépendances
        working-directory: ./backend
        run: npm install

      - name: Démarrer le serveur et lancer les tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/todos
          NODE_ENV: test
        run: |
          node index.js &
          sleep 3
          npm test

  deploy:
    runs-on: ubuntu-latest
    name: Déploiement
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Déployer sur App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: tp-azure-backend
          package: ./backend